name: Metrics
on:
  schedule:
    - cron: "0 */6 * * *" # 每 6 小时全自动统计并更新一次
  workflow_dispatch: # 同时保留手动点击运行的按钮

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    steps:
      - name: Generate Core Metrics (Default White Theme)
        uses: lowlighter/metrics@latest
        with:
          # 修复核心：在 schedule 模式下，必须改用 filename 参数来让官方安全地写入图片
          filename: github-metrics.svg 
          token: ${{ secrets.TOKEN }} # 必须确保仓库 Secrets 里有一个全大写的 TOKEN
          user: lc1216
          template: classic
          base: header, activity, community, repositories, metadata
          config_timezone: Asia/Shanghai
          
          # 核心语言分类统计
          plugin_languages: yes
          plugin_languages_ignored: html, css, tex, less, sass, scss, markdown
          plugin_languages_details: bytes-size, percentage
          plugin_languages_limit: 8
