name: Metrics
on:
  schedule:
    - cron: "0 */6 * * *" # 每 6 小时全自动统计并更新一次
  workflow_dispatch: # 同时保留手动点击运行的按钮

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    steps:
      - name: Generate Core Metrics (Default White Theme)
        uses: lowlighter/metrics@latest
        with:
          filename: github-metrics.svg 
          # 💡 彻底免除 Token 配置：直接使用官方内置的免密通道（仅对公开主页仓库有效）
          token: ${{ github.token }} 
          user: lc1216
          template: classic
          base: header, activity, community, repositories, metadata
          config_timezone: Asia/Shanghai
          
          # 核心语言分类统计
          plugin_languages: yes
          plugin_languages_ignored: html, css, tex, less, sass, scss, markdown
          plugin_languages_details: bytes-size, percentage
          plugin_languages_limit: 8
